  <circle class="ink" cx="256" cy="256" r="164" fill="none" stroke="#1a1714" stroke-width="36" />
  <path class="ink" d="M126 181 386 331M126 331 386 181" fill="none" stroke="#1a1714" stroke-width="28" />
  <circle cx="174" cy="282" r="34" fill="#b44a1c" />
  <circle cx="276" cy="176" r="34" fill="#b44a1c" />
  <circle cx="344" cy="308" r="34" fill="#b44a1c" />
</svg>
