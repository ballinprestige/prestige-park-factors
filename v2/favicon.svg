<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Prestige Atmospheric station mark">
  <!-- Token map: #faf8f5=--paper(day), #1a1714=--ink(day), #b44a1c=--accent(day), #0e1215=--paper(night), #ede7dd=--ink(night). -->
  <style>
    @media (prefers-color-scheme: dark) {
      .ground { fill: #0e1215; }
      .ink { stroke: #ede7dd; }
    }
  </style>
